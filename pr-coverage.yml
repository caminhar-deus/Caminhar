name: PR Test Coverage

on:
  pull_request:
    branches: [ main ]

jobs:
  call-test-base:
    uses: ./.github/workflows/test-base.yml
    with:
      test-type: coverage
      run-command: |
        npx jest --coverage | tee coverage-output.txt
      skip-k6: true
      seed-db: false
    secrets: inherit

  coverage-report:
    needs: call-test-base
    if: always()
    runs-on: ubuntu-latest

    # Necessário para permitir que a Action crie comentários no PR
    permissions:
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: ./.github/actions/setup

      - name: Download Coverage Output
        uses: actions/download-artifact@v4
        with:
          name: coverage-output

      - name: Run Knip (Dead Code Analysis)
        run: npm run knip

      - name: Remove Old Coverage Comments
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComments = comments.filter(c => 
              c.user.type === 'Bot' && 
              c.body.includes('### ❌ Cobertura de Testes Abaixo do Mínimo Exigido')
            );
            for (const comment of botComments) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: comment.id,
              });
            }

      - name: Post PR Comment on Failure
        if: ${{ needs.call-test-base.result == 'failure' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('coverage-output.txt', 'utf8');

            const comment = `### ❌ Cobertura de Testes Abaixo do Mínimo Exigido\nSua alteração resultou em uma cobertura de testes abaixo dos thresholds definidos (Branches: 80% | Functions: 85% | Lines: 90% | Statements: 90%).\n\n<details>\n<summary>📊 Ver Detalhes da Cobertura</summary>\n\n\`\`\`text\n${output}\n\`\`\`\n</details>`;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Upload Coverage HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jest-coverage-report
          path: coverage/
          retention-days: 7