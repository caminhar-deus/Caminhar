name: PR Test Coverage

on:
  pull_request:
    branches: [ main ]

jobs:
  coverage:
    name: Enforce >20% Test Coverage (Baseline)
    runs-on: ubuntu-latest
    
    # Necessário para permitir que a Action crie comentários no PR
    permissions:
      pull-requests: write
    
    # Serviços necessários para rodar os testes de integração do seu projeto
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: caminhar_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Remove Old Coverage Comments
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComments = comments.filter(c => 
              c.user.type === 'Bot' && 
              c.body.includes('### ❌ Cobertura de Testes Rejeitada')
            );
            for (const comment of botComments) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: comment.id,
              });
            }

      - name: Setup Test Database
        run: npm run setup:test-db
        env:
          TEST_DB_HOST: localhost
          TEST_DB_PORT: 5432
          TEST_DB_NAME: caminhar_test
          TEST_DB_USER: test_user
          TEST_DB_PASS: test_password

      - name: Run Tests, Check Coverage & Capture Output
        id: run_tests
        # O uso do "tee" salva a saída em um arquivo texto sem esconder a execução do console
        run: npx jest --coverage --coverageThreshold='{"global":{"branches":20,"functions":20,"lines":20,"statements":20}}' | tee coverage-output.txt
        env:
          # Variáveis necessárias conforme docs/TESTING.md
          TEST_DB_HOST: localhost
          TEST_DB_PORT: 5432
          TEST_DB_NAME: caminhar_test
          TEST_DB_USER: test_user
          TEST_DB_PASS: test_password
          TEST_REDIS_URL: redis://localhost:6379
          TEST_JWT_SECRET: test-secret-pr

      - name: Post PR Comment on Failure
        # Executa APENAS se o passo anterior ("run_tests") falhar
        if: failure() && steps.run_tests.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('coverage-output.txt', 'utf8');
            
            const comment = `### ❌ Cobertura de Testes Abaixo de 20%\nSua alteração resultou em uma cobertura de testes global abaixo do mínimo de 20%.\n\n<details>\n<summary>📊 Ver Detalhes da Cobertura</summary>\n\n\`\`\`text\n${output}\n\`\`\`\n</details>`;
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Upload Coverage HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jest-coverage-report
          path: coverage/
          retention-days: 7