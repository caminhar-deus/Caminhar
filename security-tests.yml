name: Security Tests (k6)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Permite execução manual via interface do GitHub

jobs:
  run-tests:
    uses: ./.github/workflows/test-base.yml
    with:
      test-type: security
      run-command: |
        k6 run load-tests/ddos-search-test.js
        k6 run load-tests/rate-limit-test.js
        k6 run load-tests/login-negative-test.js
        k6 run load-tests/ip-spoofing-test.js
    secrets: inherit

  upload-reports:
    needs: run-tests
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Upload Security Test Reports
        uses: actions/upload-artifact@v4
        with:
          name: k6-security-test-reports
          path: reports/k6-summaries/
          retention-days: 30