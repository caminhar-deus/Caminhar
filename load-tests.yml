name: Load Tests (k6)

on:
  schedule:
    # Executa todos os dias às 03:00 UTC (madrugada no Brasil)
    - cron: '0 3 * * *'
  workflow_dispatch: # Permite execução manual via interface do GitHub

jobs:
  performance-test:
    name: Run k6 Load Tests
    runs-on: ubuntu-latest
    
    services:
      # Serviço PostgreSQL para o teste (isolado)
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: caminhar_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # Serviço Redis para Rate Limiting/Cache
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: ./.github/actions/setup

      - name: Restore Next.js Build Cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('next.config.js', 'pages/**/*', 'lib/**/*', 'components/**/*') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Create Reports Directory
        run: mkdir -p reports/k6-summaries

      - name: Setup Test Database
        uses: ./.github/actions/setup-db
        with:
          seed: 'true'

      - name: Build Application
        run: npm run build
        env:
          DATABASE_URL: postgres://test_user:test_password@localhost:5432/caminhar_test
          JWT_SECRET: test-secret-for-build

      - name: Start Application (Background)
        run: |
          npm start &
          npx wait-on http://localhost:3000 --timeout 60000
        env:
          PORT: 3000
          NODE_ENV: production
          DATABASE_URL: postgres://test_user:test_password@localhost:5432/caminhar_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret-for-load-tests
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME || 'admin' }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          LOG_LEVEL: error # Reduz ruído nos logs durante carga alta

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Run Performance Tests
        run: |
          k6 run load-tests/performance/stress-test-combined.js
          k6 run load-tests/performance/musicas-load-test.js
          k6 run load-tests/performance/videos-load-test.js
        env:
          BASE_URL: http://localhost:3000
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME || 'admin' }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}

      - name: Run Functional Tests
        run: |
          k6 run load-tests/functional/health-check.js
          k6 run load-tests/functional/cache-headers-test.js
        env:
          BASE_URL: http://localhost:3000

      - name: Run Security Tests
        run: |
          k6 run load-tests/security/rate-limit-test.js
          k6 run load-tests/security/ip-spoofing-test.js
          k6 run load-tests/security/ddos-search-test.js
        env:
          BASE_URL: http://localhost:3000
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME || 'admin' }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}

      - name: Upload Test Reports
        if: always() # Executa mesmo se os testes falharem para podermos analisar o motivo
        uses: actions/upload-artifact@v4
        with:
          name: k6-load-test-reports
          path: reports/k6-summaries/
          retention-days: 30